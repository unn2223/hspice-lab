<svg xmlns="http://www.w3.org/2000/svg" width="1235" height="881" viewBox="0 0 1235 881">
  <rect width="1235" height="881" fill="#fff"/>
  <rect x="37" y="13" width="1034" height="90" fill="#ffff8a"/>
  <text x="53" y="49" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="31" font-weight="600" fill="#000">
    * 실습문제 2. 수동소자인 저항과 캐패시터으로 이루어진 회로의 동작점과
  </text>
  <text x="234" y="86" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="31" font-weight="600" fill="#000">
    주파수 특성 구하기
  </text>

  <text x="52" y="166" font-family="Times New Roman, serif" font-size="31" fill="#111">
    <tspan x="52" dy="0">Create a netlist named “lab2.sp” which describes the circuit shown at figure.</tspan>
    <tspan x="52" dy="33">Use LIST, POST, NODE as options, and request an operating point be calculated.</tspan>
    <tspan x="52" dy="33">And request an ac sweep 10 points per decade from 1kHz to 1MHz,</tspan>
    <tspan x="52" dy="33">and a print the AC voltage at nodes 1 and 2, and the AC current through r2 and c1.</tspan>
  </text>

  <g stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="square" stroke-linejoin="round">
