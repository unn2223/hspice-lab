  <text x="87" y="740" font-family="Times New Roman, serif" font-size="30" fill="#111">
    <tspan x="87" dy="0">Run HSPICE, eg. Hspice lab2.sp &gt;\! Lab2.lis</tspan>
    <tspan x="87" dy="33">Review the output file (lab2.lis ) and search for “ac analysis”.</tspan>
    <tspan x="87" dy="33">After then, run awaves and call up lab1b.sp. Display the voltage at node 2.</tspan>
    <tspan x="87" dy="33">Change the X axis to log.</tspan>
  </text>
