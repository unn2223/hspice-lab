    <tspan x="60" dy="33">AC analysis, 20 points per decade from 100 to 100MegaHz</tspan>
    <tspan x="60" dy="33">Transient analysis, 2us steps for 40us.</tspan>
    <tspan x="60" dy="33">View the result of wave form of DB/Phase of voltage at node 3 and transient result of</tspan>
