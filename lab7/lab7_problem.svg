  <text x="42" y="61" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="32" font-weight="600" fill="#000">
    실습문제 7. <tspan font-family="Times New Roman, serif" font-weight="700">MOSFET</tspan>의 <tspan font-family="Times New Roman, serif" font-weight="700">Inverter</tspan> 특성 분석하기
  </text>

  <text x="65" y="158" font-family="Times New Roman, serif" font-size="31" fill="#111">
    <tspan x="65" dy="0">Create a netlist named “lab7.sp” which describes the circuit shown at figure.</tspan>
    <tspan x="65" dy="33">The length for both MOS device is 1u, and the width is 20u.</tspan>
    <tspan x="65" dy="33">The pulse is (vlow=0.2, vhigh=4.8, tdly=2n, tf=fr=1n, pw=5n, trep=20n)</tspan>
    <tspan x="65" dy="33">The tran is 20n in 200p steps, and use the MOSFET model</tspan>
    <tspan x="65" dy="33">( .MODEL nch NMOS level = 13</tspan>
    <tspan x="65" dy="33">&#160;&#160;.MODEL pch PMOS level = 13)</tspan>
    <tspan x="65" dy="33">Sweep VIN from 0V to 5V in 500mV increments. Print out V(out) and V(in).</tspan>
  </text>

