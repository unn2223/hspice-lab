  <text x="31" y="57" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="32" font-weight="600" fill="#000">
    실습문제 6. <tspan font-family="Times New Roman, serif" font-weight="700">Peak Detector</tspan> 특성 분석하기
  </text>

  <text x="54" y="154" font-family="Times New Roman, serif" font-size="31" fill="#111">
    <tspan x="54" dy="0">Create a netlist named “lab6.sp” which describes the circuit shown at figure.</tspan>
    <tspan x="54" dy="33">V1 is a SIN wave source, 0volt offset, 1volt peak amplitude, frequency of 1KHz</tspan>
    <tspan x="54" dy="33">V2 is a 500mV DC source.</tspan>
    <tspan x="54" dy="33">Use DN4148 model, print out V(2) and V(1) vs, TIME</tspan>
    <tspan x="54" dy="33">Transient analysis, 10us steps for 3ms.</tspan>
    <tspan x="54" dy="33">Diode model ( .MODEL DN4148 D (CJO=5PF VJ=0.6 M=0.45 RS=0.8 IS=7e−9</tspan>
    <tspan x="54" dy="33">+ N=2 TT=6e−9 BV=100) )</tspan>
  </text>

