<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="882" viewBox="0 0 1366 882">
  <rect width="1366" height="882" fill="#fff"/>
  <rect x="35" y="13" width="1283" height="90" fill="#ffff8a"/>
  <text x="49" y="50" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="31" font-weight="600" fill="#000">
    •실습문제 3. 수동소자인 저항과 캐패시터으로 이루어진 회로에 <tspan font-family="Times New Roman, serif" font-weight="700">Pulse</tspan>전압을 인가하여
  </text>
  <text x="238" y="87" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="31" font-weight="600" fill="#000">
    <tspan font-family="Times New Roman, serif" font-weight="700">transient</tspan> 해석하기
  </text>

  <text x="38" y="142" font-family="Times New Roman, serif" font-size="31" fill="#111">
    <tspan x="38" dy="0">Create a netlist nemed “lab3.sp” which describes the circuit shown at figure.</tspan>
    <tspan x="38" dy="33">Add a pulse input to the voltage source as follows</tspan>
    <tspan x="38" dy="33">(starting voltage = 0v, pulse voltage = 5v, delay = 10ns, rise time = fall time = 20ns,</tspan>
    <tspan x="38" dy="33">pulse width = 500ns, pulse repetition time = 2us)</tspan>
    <tspan x="38" dy="33">Use LIST , POST, NODE as options, and request an operating point be calculated.</tspan>
    <tspan x="38" dy="33">And request an transient analysis until 2usec with 10nsec time step.</tspan>
  </text>

