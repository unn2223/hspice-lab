  <text x="74" y="752" font-family="Times New Roman, serif" font-size="29" fill="#111">
    <tspan x="74" dy="0">Run HSPICE, eg. Hspice lab3.sp &gt;\! Lab3.lis</tspan>
    <tspan x="74" dy="33">Review the output file (lab3.lis ) and search for “transient analysis”.</tspan>
    <tspan x="74" dy="33">After then, run awaves and call up lab1c.sp. Display the voltage at node1 and node 2.</tspan>
    <tspan x="74" dy="33">And display the currents through r2 and c1.</tspan>
  </text>
